<!DOCTYPE html>
<html>
<head>
    <title>Kamal Live Dashboard</title>
    <meta http-equiv="refresh" content="60">
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; }
        .box { border: 2px solid #00ff00; padding: 20px; margin: 20px; border-radius: 10px; display: inline-block; width: 250px; }
        h1 { color: #00ff00; }
        .price { font-size: 2em; font-weight: bold; }
        .time { color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🚀 KAMAL TRADING DASHBOARD 🚀</h1>
    <div id="dashboard">
        <div class="box">
            <div>NIFTY 50</div>
            <div id="nifty" class="price">Loading...</div>
        </div>
        <div class="box">
            <div>SENSEX</div>
            <div id="sensex" class="price">Loading...</div>
        </div>
    </div>
    <div class="time">Last Update: <span id="update-time">--:--:--</span></div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('nifty').innerText = '₹' + data.nifty;
                document.getElementById('sensex').innerText = '₹' + data.sensex;
                document.getElementById('update-time').innerText = data.time;
            })
            .catch(err => {
                document.getElementById('nifty').innerText = 'Syncing...';
                document.getElementById('sensex').innerText = 'Syncing...';
            });
    </script>
</body>
</html>
